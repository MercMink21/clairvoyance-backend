name: Daily Social Cards Email

on:
  schedule:
    # 11:30 MT = 17:30 UTC (MDT) / 18:30 UTC (MST)
    - cron: '30 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q playwright requests imageio-ffmpeg
          playwright install chromium --with-deps

      - name: Generate cards and send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SOCIAL_CARD_EMAIL_TO: ${{ secrets.SOCIAL_CARD_EMAIL_TO }}
        run: |
          python scripts/generate_social_cards.py

      # Milestone state (data/social_milestones.json) has to persist across
      # runs so a milestone only ever fires once - GitHub Actions runners
      # are ephemeral, so the repo itself is the only place that can hold
      # that state between runs.
      - name: Commit milestone state
        run: |
          git config user.name  "Clairvoyance Bot"
          git config user.email "bot@clairvoyance"
          git add data/social_milestones.json
          if git diff --cached --quiet; then
            echo "No milestone state change"
          else
            git commit -m "social-cards: milestone state update"
            git pull --rebase origin main
            git push
          fi
