name: Scheduled Data Refresh

on:
  schedule:
    # 09:00 MT = 15:00 UTC (MDT) / 16:00 UTC (MST)
    - cron: '0 15 * * *'
    # 15:00 MT = 21:00 UTC (MDT) / 22:00 UTC (MST)
    - cron: '0 21 * * *'
    # 23:00 MT = 05:00 UTC next day (MDT) / 06:00 UTC (MST)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q requests beautifulsoup4 lxml playwright
          playwright install chromium --with-deps 2>/dev/null || true

      - name: Run Clairvoyance update v7.0
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TZ: America/Denver
        run: |
          python scripts/clairvoyance_update.py --no-linemate
        timeout-minutes: 15

      - name: Commit and push data
        run: |
          git config user.name  "Clairvoyance Bot"
          git config user.email "bot@clairvoyance"
          git add docs/data.json docs/live_data.json docs/social_copy.json docs/soccer_fbref.json docs/mls_stats.json docs/mls_schedule.json data/ || true
          git diff --cached --quiet || git commit -m "auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"
