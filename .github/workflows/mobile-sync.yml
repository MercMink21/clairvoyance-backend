name: Sync to Mobile Repo

on:
  push:
    branches: [main]
    paths:
      - 'docs/app.html'
      - 'docs/index.html'
      - 'docs/data.json'
      - 'docs/picks.json'
      - 'docs/live_data.json'
      - 'docs/version.json'
      - 'docs/sw.js'
      - 'docs/manifest.json'
      - 'docs/icon-1080.png'
      - 'docs/card.png'
      - 'scripts/mobile_transform.py'
  workflow_dispatch: {}

jobs:
  sync-mobile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout clairvoyance-backend (source)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Clone Clairvoyance-backend-mobile
        run: |
          git config --global user.email "mobile-sync@clairvoyanceengine.info"
          git config --global user.name "Clairvoyance Mobile Sync"
          git clone https://MercMink21:${{ secrets.MOBILE_SYNC_TOKEN }}@github.com/MercMink21/Clairvoyance-backend-mobile.git mobile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync docs files to mobile repo
        run: |
          # Copy all docs files except we'll regenerate app.html and index.html
          cp source/docs/data.json       mobile/docs/data.json        2>/dev/null || true
          cp source/docs/picks.json      mobile/docs/picks.json       2>/dev/null || true
          cp source/docs/live_data.json  mobile/docs/live_data.json   2>/dev/null || true
          cp source/docs/version.json    mobile/docs/version.json     2>/dev/null || true
          cp source/docs/sw.js           mobile/docs/sw.js            2>/dev/null || true
          cp source/docs/manifest.json   mobile/docs/manifest.json    2>/dev/null || true
          cp source/docs/card.png        mobile/docs/card.png         2>/dev/null || true
          cp source/docs/icon-1080.png   mobile/docs/icon-1080.png    2>/dev/null || true

      - name: Apply mobile transform to app.html
        run: |
          mkdir -p mobile/docs
          python3 source/scripts/mobile_transform.py source/docs/app.html mobile/docs/app.html
          cp mobile/docs/app.html mobile/docs/index.html
          echo "Mobile transform done"

      - name: Commit and push to mobile repo
        run: |
          cd mobile
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to push to mobile repo"
          else
            COMMIT_MSG=$(cd ../source && git log -1 --pretty=format:"%s")
            git commit -m "mobile-sync: ${COMMIT_MSG}"
            git push origin main
            echo "Pushed to Clairvoyance-backend-mobile"
          fi
