<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .scanbar {
    position:absolute; left:0; right:0; height:6px;
    background:linear-gradient(90deg,transparent,rgba(0,240,255,.9),transparent);
    box-shadow:0 0 30px 6px rgba(0,240,255,.8);
    top:-6px; animation: sweep 1.6s cubic-bezier(.3,0,.4,1) .3s forwards;
  }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:64px; letter-spacing:6px;
    color:#f000ff; text-shadow:0 0 18px #f000ff,0 0 44px rgba(240,0,255,.7);
    opacity:0; filter:blur(6px); animation: sharpen .5s ease-out 1.7s forwards;
  }
  .headline {
    font-family:'Share Tech Mono',monospace; font-size:22px; letter-spacing:5px;
    color:#f000ff; margin-top:14px; opacity:0; filter:blur(6px);
    animation: sharpen .5s ease-out 2.0s forwards;
  }
  .stats { display:flex; gap:34px; margin-top:64px; }
  .stat { text-align:center; opacity:0; filter:blur(8px); }
  .stat:nth-child(1) { animation: sharpen .55s ease-out 2.35s forwards; }
  .stat:nth-child(2) { animation: sharpen .55s ease-out 2.6s forwards; }
  .stat:nth-child(3) { animation: sharpen .55s ease-out 2.85s forwards; }
  .stat:nth-child(4) { animation: sharpen .55s ease-out 3.1s forwards; }
  .stat-val { font-family:'Orbitron',sans-serif; font-weight:900; font-size:50px; white-space:nowrap; }
  .stat-lbl { font-family:'Share Tech Mono',monospace; font-size:18px; letter-spacing:3px; color:rgba(180,220,255,.5); margin-top:6px; }
  .val-record { color:#e6eaff; }
  .val-pct { color:#00f0ff; text-shadow:0 0 14px rgba(0,240,255,.6); }
  .val-units { color:#00da88; text-shadow:0 0 14px rgba(0,218,136,.6); }
  .val-locked { color:#ffcc00; text-shadow:0 0 14px rgba(255,204,0,.6); }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Share Tech Mono',monospace; font-size:18px; color:#f000ff; text-shadow:0 0 10px rgba(240,0,255,.6);
    opacity:0; animation: sharpen .6s ease-out 3.45s forwards;
  }
  @keyframes sweep { to { top:1350px; } }
  @keyframes sharpen { to { opacity:1; filter:blur(0); } }
</style>
</head>
<body>
  <canvas id="bgCanvas" width="1080" height="1350" style="position:absolute;top:0;left:0;z-index:-1"></canvas>
  <script>
    // Exact same background algorithm as _cfBg() in docs/app.html (the
    // real card generator) — pixel-matched to StandardLogo.png. Drawing
    // it with canvas instead of approximating with CSS gradients avoids
    // any anti-aliasing/rendering differences between the two.
    (function(){
      var cv=document.getElementById('bgCanvas');
      var ctx=cv.getContext('2d');
      var W=1080,H=1350,cx=W/2,cy=H/2;
      ctx.fillStyle='#222233';ctx.fillRect(0,0,W,H);
      var DS=Math.max(8,Math.round(W/64));
      ctx.save();
      ctx.strokeStyle='rgba(78,166,176,.5)';ctx.lineWidth=1;
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,H);ctx.lineTo(i+H,0);ctx.stroke();}
      ctx.restore();
      var vg=ctx.createRadialGradient(cx,cy,W*.30,cx,cy,W*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.22)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    })();
  </script>
  <div class="stage">
    <div class="scanbar"></div>
    <div class="logo">CLAIRVOYANCE</div>
    <div class="headline" id="headline">YESTERDAY'S PERFORMANCE</div>
    <div class="stats">
      <div class="stat"><div class="stat-val val-record" id="v-record">—</div><div class="stat-lbl">RECORD</div></div>
      <div class="stat"><div class="stat-val val-pct" id="v-pct">—</div><div class="stat-lbl">WIN %</div></div>
      <div class="stat"><div class="stat-val val-units" id="v-units">—</div><div class="stat-lbl">UNITS</div></div>
      <div class="stat"><div class="stat-val val-locked" id="v-locked">—</div><div class="stat-lbl">BETS LOCKED</div></div>
    </div>
    <div class="footer">X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine &nbsp;·&nbsp; clairvoyanceengine.info</div>
  </div>
</body>
</html>
