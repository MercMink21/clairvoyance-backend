<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; background:#222233; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:
      repeating-linear-gradient(45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      repeating-linear-gradient(-45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,.22) 72%);
    background-color:#222233;
    display:flex; flex-direction:column; align-items:center; padding-top:110px;
  }
  .tag {
    font-family:'Share Tech Mono',monospace; font-size:18px; letter-spacing:8px;
    color:#00f0ff; text-shadow:0 0 12px rgba(0,240,255,.6);
    opacity:0; animation: reveal .6s ease-out forwards;
  }
  .title {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:52px; text-align:center;
    color:#f000ff; text-shadow:0 0 18px #f000ff,0 0 44px rgba(240,0,255,.6);
    max-width:860px; margin:18px 0 60px; opacity:0;
    animation: reveal .7s ease-out .35s forwards;
  }
  .lines { width:860px; display:flex; flex-direction:column; gap:36px; }
  .line {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:30px; line-height:1.55;
    color:#e6eaff; opacity:0; transform:translateY(14px); border-left:3px solid rgba(240,0,255,.6);
    padding-left:24px;
  }
  .logo {
    position:absolute; bottom:130px; left:0; right:0; text-align:center;
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:36px; letter-spacing:5px;
    color:#f000ff; text-shadow:0 0 14px #f000ff,0 0 32px rgba(240,0,255,.6);
    opacity:0;
  }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Share Tech Mono',monospace; font-size:15px; color:rgba(220,210,255,.5);
    opacity:0;
  }
  @keyframes reveal { to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
  <div class="stage">
    <div class="tag" id="tag">// EDUCATIONAL</div>
    <div class="title" id="title">HOW WE GRADE PICKS</div>
    <div class="lines" id="lines"></div>
    <div class="logo" id="logo">CLAIRVOYANCE</div>
    <div class="footer" id="footer">clairvoyanceengine.info &nbsp;·&nbsp; X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine</div>
  </div>
  <script>
    // populateLines(tag, title, [line1, line2, ...]) — each line fades/
    // slides in staggered, then logo + footer settle in after the last one.
    window.populateLines = function(tag, title, lines) {
      document.getElementById('tag').textContent = tag;
      document.getElementById('title').textContent = title;
      const container = document.getElementById('lines');
      container.innerHTML = '';
      lines.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'line';
        div.textContent = text;
        div.style.animation = `reveal .6s ease-out ${0.9 + i * 1.1}s forwards`;
        container.appendChild(div);
      });
      const tailDelay = 0.9 + lines.length * 1.1 + 0.4;
      document.getElementById('logo').style.animation = `reveal .7s ease-out ${tailDelay}s forwards`;
      document.getElementById('footer').style.animation = `reveal .7s ease-out ${tailDelay + 0.25}s forwards`;
    };
  </script>
</body>
</html>
