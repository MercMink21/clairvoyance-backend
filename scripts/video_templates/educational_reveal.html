<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:transparent;
    display:flex; flex-direction:column; align-items:center; padding-top:64px;
  }
  .logo-wrap { position:relative; width:1000px; height:66px; }
  .logo, .logo-r, .logo-c {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:56px; letter-spacing:6px;
    position:absolute; top:0; left:50%; transform:translateX(-50%); white-space:nowrap;
  }
  .logo { color:#f000ff; text-shadow:0 0 16px #f000ff,0 0 40px rgba(240,0,255,.7); opacity:0; animation: settle .01s linear .7s forwards; }
  .logo-r { color:#ff2090; opacity:.8; animation: glitchR .6s steps(2) forwards, hide .01s linear .7s forwards; }
  .logo-c { color:#00f0ff; opacity:.8; animation: glitchC .6s steps(2) forwards, hide .01s linear .7s forwards; }
  .sub {
    font-family:'Orbitron',sans-serif; font-weight:600; font-size:20px; letter-spacing:4px;
    color:#00f0ff; text-shadow:0 0 10px #00f0ff; margin-top:8px;
    opacity:0; animation: reveal .01s linear .85s forwards;
  }
  .tag {
    font-family:'Share Tech Mono',monospace; font-size:17px; letter-spacing:7px;
    color:#00f0ff; text-shadow:0 0 10px rgba(0,240,255,.5);
    margin-top:44px; opacity:0; animation: reveal .01s linear 1.1s forwards;
  }
  .title {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:46px; text-align:center;
    color:#f000ff; text-shadow:0 0 16px #f000ff,0 0 40px rgba(240,0,255,.6);
    max-width:880px; margin:14px 0 48px; opacity:0;
    animation: reveal .01s linear 1.3s forwards;
  }
  .lines { width:860px; display:flex; flex-direction:column; gap:32px; }
  .line {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:28px; line-height:1.5;
    color:#e6eaff; opacity:0; border-left:3px solid rgba(240,0,255,.6);
    padding-left:22px; display:inline-block;
  }
  /* Same per-element glitch language as the daily glitch reveal's stats:
     a hue-rotate + jitter burst, then settle and hold still. */
  @keyframes lineGlitch {
    0%   { filter:hue-rotate(0deg) saturate(1); transform:translate(0,0); }
    20%  { filter:hue-rotate(110deg) saturate(4) brightness(1.3); transform:translate(5px,-2px); }
    40%  { filter:hue-rotate(-110deg) saturate(4) brightness(1.3); transform:translate(-5px,2px); }
    60%  { filter:hue-rotate(70deg) saturate(3); transform:translate(3px,1px); }
    80%  { filter:hue-rotate(-70deg) saturate(3); transform:translate(-3px,-1px); }
    100% { filter:hue-rotate(0deg) saturate(1); transform:translate(0,0); }
  }
  @keyframes lineIn { to { opacity:1; } }
  .footer {
    position:absolute; bottom:60px; left:0; right:0; text-align:center;
    font-family:'Orbitron',sans-serif; font-size:28px; letter-spacing:3px; color:#f000ff;
    opacity:0;
  }
  @keyframes glitchR { 0%{transform:translate(calc(-50% - 5px),-3px)} 25%{transform:translate(calc(-50% + 4px),3px)} 50%{transform:translate(calc(-50% - 3px),-2px)} 75%{transform:translate(calc(-50% + 5px),3px)} 100%{transform:translate(calc(-50% - 5px),-3px)} }
  @keyframes glitchC { 0%{transform:translate(calc(-50% + 5px),3px)} 25%{transform:translate(calc(-50% - 4px),-3px)} 50%{transform:translate(calc(-50% + 3px),2px)} 75%{transform:translate(calc(-50% - 5px),-3px)} 100%{transform:translate(calc(-50% + 5px),3px)} }
  @keyframes hide { to { opacity:0; } }
  @keyframes settle { to { opacity:1; } }
  @keyframes reveal { to { opacity:1; } }
</style>
</head>
<body>
  <canvas id="bgCanvas" width="1080" height="1350" style="position:absolute;top:0;left:0;z-index:-1"></canvas>
  <script>
    // Exact same background algorithm as _cfBg() in docs/app.html (the
    // real card generator) — pixel-matched to StandardLogo.png. Drawing
    // it with canvas instead of approximating with CSS gradients avoids
    // any anti-aliasing/rendering differences between the two.
    (function(){
      var cv=document.getElementById('bgCanvas');
      var ctx=cv.getContext('2d');
      var W=1080,H=1350,cx=W/2,cy=H/2;
      ctx.fillStyle='#222233';ctx.fillRect(0,0,W,H);
      var DS=Math.max(8,Math.round(W/64));
      ctx.save();
      ctx.strokeStyle='rgba(78,166,176,.5)';ctx.lineWidth=1;
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,H);ctx.lineTo(i+H,0);ctx.stroke();}
      ctx.restore();
      var vg=ctx.createRadialGradient(cx,cy,W*.30,cx,cy,W*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.22)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    })();
  </script>
  <div class="stage">
    <div class="logo-wrap">
      <div class="logo-r">CLAIRVOYANCE</div>
      <div class="logo-c">CLAIRVOYANCE</div>
      <div class="logo">CLAIRVOYANCE</div>
    </div>
    <div class="sub">ADVANCED SPORTS INTELLIGENCE ENGINE</div>
    <div class="tag" id="tag">// EDUCATIONAL</div>
    <div class="title" id="title">HOW WE GRADE PICKS</div>
    <div class="lines" id="lines"></div>
    <div class="footer" id="footer">clairvoyanceengine.info &nbsp;·&nbsp; X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine</div>
  </div>
  <script>
    // populateLines(tag, title, [line1, line2, ...]) — each line glitches
    // in on its own beat (same language as the daily glitch reveal's per-
    // stat glitch-in), then holds crisp and still. Footer settles after.
    window.populateLines = function(tag, title, lines) {
      document.getElementById('tag').textContent = tag;
      document.getElementById('title').textContent = title;
      const container = document.getElementById('lines');
      container.innerHTML = '';
      lines.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'line';
        div.textContent = text;
        const delay = 1.6 + i * 1.1;
        div.style.animation = `lineGlitch .4s steps(4) ${delay}s forwards, lineIn .01s linear ${delay}s forwards`;
        container.appendChild(div);
      });
      const tailDelay = 1.6 + lines.length * 1.1 + 0.4;
      document.getElementById('footer').style.animation = `reveal .01s linear ${tailDelay}s forwards`;
    };
  </script>
</body>
</html>
