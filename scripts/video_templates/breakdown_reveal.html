<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:transparent;
    display:flex; flex-direction:column; align-items:center; padding-top:70px;
  }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:54px; letter-spacing:6px;
    color:#f000ff; text-shadow:0 0 16px #f000ff,0 0 40px rgba(240,0,255,.7);
    opacity:0; animation: reveal .7s ease-out forwards;
  }
  .headline {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:28px; letter-spacing:3px;
    color:#00f0ff; text-shadow:0 0 12px #00f0ff,0 0 28px rgba(0,240,255,.6);
    margin-top:14px; opacity:0; animation: reveal .7s ease-out .3s forwards;
  }
  .rows { width:880px; margin-top:56px; display:flex; flex-direction:column; gap:16px; }
  .row {
    display:flex; justify-content:space-between; align-items:center;
    background:rgba(20,10,40,.55); border:1px solid rgba(240,0,255,.2); border-radius:6px;
    padding:20px 28px; opacity:0; transform:translateX(-24px);
  }
  .row .label { font-family:'Orbitron',sans-serif; font-weight:700; font-size:26px; color:#e6eaff; }
  .row .val { font-family:'Share Tech Mono',monospace; font-size:22px; display:flex; gap:20px; }
  .row .rec { color:#e6eaff; min-width:90px; text-align:right; }
  .row .pct { color:#00f0ff; min-width:75px; text-align:right; }
  .row .units { min-width:90px; text-align:right; }
  .row.total {
    border-color:rgba(0,218,136,.5); background:rgba(0,218,136,.08); margin-top:8px;
  }
  .row.total .label, .row.total .pct, .row.total .units { color:#00da88; }
  .footer {
    position:absolute; bottom:60px; left:0; right:0; text-align:center;
    font-family:'Orbitron',sans-serif; font-size:18px; letter-spacing:3px; color:#f000ff;
    opacity:0; animation: reveal .8s ease-out forwards;
  }
  .footer-sub { font-family:'Share Tech Mono',monospace; font-size:14px; color:rgba(220,210,255,.5); margin-top:6px; }
  @keyframes reveal { to { opacity:1; } }
  @keyframes rowIn { to { opacity:1; transform:translateX(0); } }
</style>
</head>
<body>
  <canvas id="bgCanvas" width="1080" height="1350" style="position:absolute;top:0;left:0;z-index:-1"></canvas>
  <script>
    // Exact same background algorithm as _cfBg() in docs/app.html (the
    // real card generator) — pixel-matched to StandardLogo.png. Drawing
    // it with canvas instead of approximating with CSS gradients avoids
    // any anti-aliasing/rendering differences between the two.
    (function(){
      var cv=document.getElementById('bgCanvas');
      var ctx=cv.getContext('2d');
      var W=1080,H=1350,cx=W/2,cy=H/2;
      ctx.fillStyle='#222233';ctx.fillRect(0,0,W,H);
      var DS=Math.max(8,Math.round(W/64));
      ctx.save();
      ctx.strokeStyle='rgba(78,166,176,.5)';ctx.lineWidth=1;
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,H);ctx.lineTo(i+H,0);ctx.stroke();}
      ctx.restore();
      var vg=ctx.createRadialGradient(cx,cy,W*.30,cx,cy,W*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.22)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    })();
  </script>
  <div class="stage">
    <div class="logo">CLAIRVOYANCE</div>
    <div class="headline" id="headline">SPORT PERFORMANCE</div>
    <div class="rows" id="rows"></div>
    <div class="footer" id="footer" style="animation-delay:0s">
      X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine
      <div class="footer-sub">clairvoyanceengine.info</div>
    </div>
  </div>
  <script>
    // populateRows(headline, [{label, record, pct, units, isTotal}]) —
    // called externally via page.evaluate() after load, so the delay-
    // staggering happens fresh relative to when data actually lands, not
    // baked in. units is a pre-formatted string (e.g. "+11.8u"); colored
    // green/pink by sign unless it's the (already-green) total row.
    window.populateRows = function(headline, rows) {
      document.getElementById('headline').textContent = headline;
      const container = document.getElementById('rows');
      container.innerHTML = '';
      rows.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'row' + (r.isTotal ? ' total' : '');
        const unitsColor = r.isTotal ? '' : (String(r.units).trim().startsWith('-') ? 'color:#ff2090' : 'color:#00da88');
        div.innerHTML = `<span class="label">${r.label}</span><span class="val"><span class="rec">${r.record}</span><span class="pct">${r.pct}</span><span class="units" style="${unitsColor}">${r.units || ''}</span></span>`;
        div.style.animation = `rowIn .5s ease-out ${0.5 + i * 0.28}s forwards`;
        container.appendChild(div);
      });
      const footerDelay = 0.5 + rows.length * 0.28 + 0.3;
      document.getElementById('footer').style.animation = `reveal .7s ease-out ${footerDelay}s forwards`;
    };
  </script>
</body>
</html>
