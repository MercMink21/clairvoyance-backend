<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; background:#222233; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:
      repeating-linear-gradient(45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      repeating-linear-gradient(-45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,.22) 72%);
    background-color:#222233;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:80px; letter-spacing:6px;
    color:#f000ff; text-shadow:0 0 20px #f000ff,0 0 50px rgba(240,0,255,.7);
    opacity:0; transform:translateX(-120px); animation: slideR .45s cubic-bezier(.2,.9,.3,1) forwards;
  }
  .headline {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:30px; letter-spacing:3px;
    color:#00f0ff; text-shadow:0 0 12px #00f0ff; margin-top:14px;
    opacity:0; transform:translateX(120px); animation: slideL .45s cubic-bezier(.2,.9,.3,1) .18s forwards;
  }
  .stats { display:flex; gap:52px; margin-top:64px; }
  .stat { text-align:center; opacity:0; }
  .stat:nth-child(1) { transform:translateX(-80px); animation: slideR .4s cubic-bezier(.2,.9,.3,1) .45s forwards; }
  .stat:nth-child(2) { transform:translateY(60px) scale(.7); animation: popUp .4s cubic-bezier(.2,1.3,.3,1) .6s forwards; }
  .stat:nth-child(3) { transform:translateX(80px); animation: slideL .4s cubic-bezier(.2,.9,.3,1) .75s forwards; }
  .stat-val { font-family:'Orbitron',sans-serif; font-weight:900; font-size:62px; }
  .stat-lbl { font-family:'Share Tech Mono',monospace; font-size:17px; letter-spacing:3px; color:rgba(220,210,255,.5); margin-top:8px; }
  .val-record { color:#e6eaff; }
  .val-pct { color:#00f0ff; text-shadow:0 0 14px rgba(0,240,255,.6); }
  .val-units { color:#00da88; text-shadow:0 0 14px rgba(0,218,136,.6); }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Share Tech Mono',monospace; font-size:15px; color:rgba(220,210,255,.5);
    opacity:0; animation: reveal .5s ease-out 1.1s forwards;
  }
  @keyframes slideR { to { opacity:1; transform:translateX(0); } }
  @keyframes slideL { to { opacity:1; transform:translateX(0); } }
  @keyframes popUp { to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes reveal { to { opacity:1; } }
</style>
</head>
<body>
  <div class="stage">
    <div class="logo">CLAIRVOYANCE</div>
    <div class="headline" id="headline">YESTERDAY'S PERFORMANCE</div>
    <div class="stats">
      <div class="stat"><div class="stat-val val-record" id="v-record">—</div><div class="stat-lbl">RECORD</div></div>
      <div class="stat"><div class="stat-val val-pct" id="v-pct">—</div><div class="stat-lbl">WIN %</div></div>
      <div class="stat"><div class="stat-val val-units" id="v-units">—</div><div class="stat-lbl">UNITS</div></div>
    </div>
    <div class="footer">X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine &nbsp;·&nbsp; clairvoyanceengine.info</div>
  </div>
</body>
</html>
