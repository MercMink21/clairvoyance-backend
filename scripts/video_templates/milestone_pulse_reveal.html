<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; background:#222233; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:
      repeating-linear-gradient(45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      repeating-linear-gradient(-45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,.22) 72%);
    background-color:#222233;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .ring {
    position:absolute; top:45%; left:50%; width:80px; height:80px;
    border:3px solid rgba(0,240,255,.8); border-radius:50%; opacity:0;
    transform:translate(-50%,-50%) scale(0);
  }
  .ring:nth-child(1) { animation: pulse 1.6s ease-out .3s forwards; }
  .ring:nth-child(2) { animation: pulse 1.6s ease-out .6s forwards; }
  .ring:nth-child(3) { animation: pulse 1.6s ease-out .9s forwards; }
  .tag {
    position:relative; font-family:'Share Tech Mono',monospace; font-size:22px; letter-spacing:8px;
    color:#00f0ff; text-shadow:0 0 14px rgba(0,240,255,.7);
    opacity:0; animation: reveal .6s ease-out 1.0s forwards;
  }
  .headline {
    position:relative; font-family:'Orbitron',sans-serif; font-weight:900; font-size:70px; text-align:center;
    color:#00f0ff; text-shadow:0 0 24px #00f0ff,0 0 60px rgba(0,240,255,.7);
    margin:26px 0; opacity:0; transform:scale(.7);
    animation: pop .7s cubic-bezier(.2,1.4,.4,1) 1.15s forwards;
  }
  .body-text {
    position:relative; font-family:'Orbitron',sans-serif; font-weight:700; font-size:26px; color:#e6eaff;
    text-align:center; max-width:760px; line-height:1.6;
    opacity:0; animation: reveal .8s ease-out 1.85s forwards;
  }
  .logo {
    position:relative; font-family:'Orbitron',sans-serif; font-weight:900; font-size:42px; letter-spacing:6px;
    color:#f000ff; text-shadow:0 0 16px #f000ff,0 0 40px rgba(240,0,255,.7);
    margin-top:70px; opacity:0; animation: reveal .7s ease-out 2.35s forwards;
  }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Share Tech Mono',monospace; font-size:15px; color:rgba(220,210,255,.5);
    opacity:0; animation: reveal .7s ease-out 2.65s forwards;
  }
  @keyframes reveal { to { opacity:1; } }
  @keyframes pop { to { opacity:1; transform:scale(1); } }
  @keyframes pulse { 0%{opacity:.9; transform:translate(-50%,-50%) scale(0)} 100%{opacity:0; transform:translate(-50%,-50%) scale(9)} }
</style>
</head>
<body>
  <div class="stage">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="tag">MILESTONE</div>
    <div class="headline" id="headline">1000 BETS TRACKED</div>
    <div class="body-text" id="body">A thousand graded picks, settled and public.</div>
    <div class="logo">CLAIRVOYANCE</div>
    <div class="footer">clairvoyanceengine.info &nbsp;·&nbsp; X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine</div>
  </div>
</body>
</html>
