<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:transparent;
    display:flex; flex-direction:column; align-items:center; padding-top:70px;
  }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:52px; letter-spacing:6px;
    color:#f000ff; text-shadow:0 0 12px #f000ff,0 0 25px rgba(240,0,255,.55);
    opacity:0; animation: reveal .7s ease-out forwards;
  }
  .tag {
    font-family:'Share Tech Mono',monospace; font-size:22px; letter-spacing:8px;
    color:#ffcc00; text-shadow:0 0 14px rgba(255,204,0,.7);
    margin-top:60px; opacity:0; animation: reveal .6s ease-out .5s forwards;
  }
  .flash {
    position:absolute; inset:0; background:#fff; opacity:0;
    animation: flashPulse .35s ease-out 1.05s;
  }
  .headline {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:76px; text-align:center;
    color:#ffcc00; text-shadow:0 0 24px #ffcc00,0 0 60px rgba(255,204,0,.7);
    margin:28px 0; opacity:0; transform:scale(.8);
    animation: pop .7s cubic-bezier(.2,1.4,.4,1) .8s forwards;
  }
  .body-text {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:26px; color:#e6eaff;
    text-align:center; max-width:760px; line-height:1.6;
    opacity:0; animation: reveal .8s ease-out 1.5s forwards;
  }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Share Tech Mono',monospace; font-size:19px; letter-spacing:0.5px; color:#f000ff; text-shadow:0 0 8px rgba(240,0,255,.5); white-space:nowrap;
    opacity:0; animation: reveal .7s ease-out 2.2s forwards;
  }
  @keyframes reveal { to { opacity:1; } }
  @keyframes pop { to { opacity:1; transform:scale(1); } }
  @keyframes flashPulse { 0%{opacity:.5} 100%{opacity:0} }
</style>
</head>
<body>
  <canvas id="bgCanvas" width="1080" height="1350" style="position:absolute;top:0;left:0;z-index:-1"></canvas>
  <script>
    // Exact same background algorithm as _cfBg() in docs/app.html (the
    // real card generator) — pixel-matched to StandardLogo.png. Drawing
    // it with canvas instead of approximating with CSS gradients avoids
    // any anti-aliasing/rendering differences between the two.
    (function(){
      var cv=document.getElementById('bgCanvas');
      var ctx=cv.getContext('2d');
      var W=1080,H=1350,cx=W/2,cy=H/2;
      ctx.fillStyle='#222233';ctx.fillRect(0,0,W,H);
      var DS=Math.max(8,Math.round(W/64));
      ctx.save();
      ctx.strokeStyle='rgba(78,166,176,.5)';ctx.lineWidth=1;
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,H);ctx.lineTo(i+H,0);ctx.stroke();}
      ctx.restore();
      var vg=ctx.createRadialGradient(cx,cy,W*.30,cx,cy,W*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.22)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    })();
  </script>
  <div class="stage">
    <div class="flash"></div>
    <div class="logo">CLAIRVOYANCE</div>
    <div class="tag">MILESTONE</div>
    <div class="headline" id="headline">10-WIN STREAK</div>
    <div class="body-text" id="body">10 straight wins.</div>
    <div class="footer">clairvoyanceengine.info &nbsp;·&nbsp; X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine</div>
  </div>
</body>
</html>
