<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; background:#0a0518; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:
      repeating-linear-gradient(45deg, rgba(255,200,0,.06) 0 2px, transparent 2px 40px),
      repeating-linear-gradient(-45deg, rgba(240,0,255,.06) 0 2px, transparent 2px 40px),
      radial-gradient(ellipse at 50% 45%, #1f1030 0%, #0a0518 75%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .tag {
    font-family:'Share Tech Mono',monospace; font-size:22px; letter-spacing:8px;
    color:#ffcc00; text-shadow:0 0 14px rgba(255,204,0,.7);
    opacity:0; animation: reveal .6s ease-out forwards;
  }
  .flash {
    position:absolute; inset:0; background:#fff; opacity:0;
    animation: flashPulse .35s ease-out .55s;
  }
  .headline {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:76px; text-align:center;
    color:#ffcc00; text-shadow:0 0 24px #ffcc00,0 0 60px rgba(255,204,0,.7);
    margin:28px 0; opacity:0; transform:scale(.8);
    animation: pop .7s cubic-bezier(.2,1.4,.4,1) .6s forwards;
  }
  .body-text {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:26px; color:#e6eaff;
    text-align:center; max-width:760px; line-height:1.6;
    opacity:0; animation: reveal .8s ease-out 1.3s forwards;
  }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:42px; letter-spacing:6px;
    color:#f000ff; text-shadow:0 0 16px #f000ff,0 0 40px rgba(240,0,255,.7);
    margin-top:70px; opacity:0; animation: reveal .7s ease-out 1.8s forwards;
  }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Share Tech Mono',monospace; font-size:15px; color:rgba(220,210,255,.5);
    opacity:0; animation: reveal .7s ease-out 2.1s forwards;
  }
  @keyframes reveal { to { opacity:1; } }
  @keyframes pop { to { opacity:1; transform:scale(1); } }
  @keyframes flashPulse { 0%{opacity:.5} 100%{opacity:0} }
</style>
</head>
<body>
  <div class="stage">
    <div class="flash"></div>
    <div class="tag">MILESTONE</div>
    <div class="headline" id="headline">10-WIN STREAK</div>
    <div class="body-text" id="body">10 straight wins.</div>
    <div class="logo">CLAIRVOYANCE</div>
    <div class="footer">clairvoyanceengine.info &nbsp;·&nbsp; X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine</div>
  </div>
</body>
</html>
