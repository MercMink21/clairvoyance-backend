<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; background:#222233; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:
      repeating-linear-gradient(45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      repeating-linear-gradient(-45deg, rgba(78,166,176,.5) 0 1px, transparent 1px 17px),
      radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,.22) 72%);
    background-color:#222233;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:88px; letter-spacing:8px;
    color:#f000ff; text-shadow:0 0 20px #f000ff,0 0 50px rgba(240,0,255,.7);
    opacity:0; transform:translateY(20px) scale(.95);
    animation: reveal .9s ease-out forwards;
  }
  .sub {
    font-family:'Orbitron',sans-serif; font-weight:600; font-size:26px; letter-spacing:6px;
    color:#00f0ff; text-shadow:0 0 12px #00f0ff,0 0 28px rgba(0,240,255,.6);
    margin-top:14px; opacity:0; animation: reveal .9s ease-out .35s forwards;
  }
  .divider {
    width:640px; height:2px; margin:44px 0;
    background:linear-gradient(90deg,transparent,rgba(240,0,255,.8),transparent);
    box-shadow:0 0 14px rgba(240,0,255,.6);
    transform:scaleX(0); animation: growLine .7s ease-out .7s forwards;
  }
  .headline {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:34px; letter-spacing:2px;
    color:#e6eaff; opacity:0; animation: reveal .8s ease-out 1.0s forwards;
    text-align:center; padding:0 60px;
  }
  .stats { display:flex; gap:56px; margin-top:60px; }
  .stat { text-align:center; opacity:0; transform:translateY(16px); }
  .stat:nth-child(1) { animation: reveal .7s ease-out 1.4s forwards; }
  .stat:nth-child(2) { animation: reveal .7s ease-out 1.65s forwards; }
  .stat:nth-child(3) { animation: reveal .7s ease-out 1.9s forwards; }
  .stat-val {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:64px;
  }
  .stat-lbl {
    font-family:'Share Tech Mono',monospace; font-size:18px; letter-spacing:3px;
    color:rgba(220,210,255,.55); margin-top:8px;
  }
  .val-record { color:#e6eaff; }
  .val-pct { color:#00f0ff; text-shadow:0 0 16px rgba(0,240,255,.6); }
  .val-units { color:#00da88; text-shadow:0 0 16px rgba(0,218,136,.6); }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Orbitron',sans-serif; font-size:20px; letter-spacing:3px; color:#f000ff;
    opacity:0; animation: reveal .8s ease-out 2.3s forwards;
  }
  .footer-sub {
    font-family:'Share Tech Mono',monospace; font-size:15px; color:rgba(220,210,255,.5);
    margin-top:8px;
  }
  @keyframes reveal { to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes growLine { to { transform:scaleX(1); } }
</style>
</head>
<body>
  <div class="stage">
    <div class="logo">CLAIRVOYANCE</div>
    <div class="sub">ADVANCED SPORTS INTELLIGENCE ENGINE</div>
    <div class="divider"></div>
    <div class="headline" id="headline">YESTERDAY'S PERFORMANCE</div>
    <div class="stats">
      <div class="stat"><div class="stat-val val-record" id="v-record">—</div><div class="stat-lbl">RECORD</div></div>
      <div class="stat"><div class="stat-val val-pct" id="v-pct">—</div><div class="stat-lbl">WIN %</div></div>
      <div class="stat"><div class="stat-val val-units" id="v-units">—</div><div class="stat-lbl">UNITS</div></div>
    </div>
    <div class="footer">
      X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine
      <div class="footer-sub">clairvoyanceengine.info</div>
    </div>
  </div>
</body>
</html>
