<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:transparent;
    display:flex; flex-direction:column; align-items:center; padding-top:100px;
  }
  .tag {
    font-family:'Share Tech Mono',monospace; font-size:20px; letter-spacing:9px;
    color:#ffcc00; text-shadow:0 0 12px rgba(255,204,0,.6);
    opacity:0; animation: reveal .7s ease-out forwards;
  }
  .logo {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:96px; letter-spacing:6px;
    color:#f000ff; text-shadow:0 0 24px #f000ff,0 0 60px rgba(240,0,255,.75);
    margin-top:16px; opacity:0; transform:scale(.9);
    animation: pop .8s cubic-bezier(.2,1.3,.35,1) .35s forwards;
  }
  .range {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:26px; letter-spacing:2px;
    color:#00f0ff; text-shadow:0 0 12px #00f0ff; margin-top:16px;
    opacity:0; animation: reveal .7s ease-out .9s forwards;
  }
  .divider {
    width:720px; height:2px; margin:48px 0;
    background:linear-gradient(90deg,transparent,rgba(255,204,0,.8),transparent);
    box-shadow:0 0 16px rgba(255,204,0,.5);
    transform:scaleX(0); animation: growLine .8s ease-out 1.3s forwards;
  }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:28px 60px; width:820px; }
  .stat {
    background:rgba(20,10,40,.5); border:1px solid rgba(240,0,255,.25); border-radius:8px;
    padding:26px; text-align:center; opacity:0; transform:translateY(20px);
  }
  .stat:nth-child(1) { animation: reveal2 .6s ease-out 1.7s forwards; }
  .stat:nth-child(2) { animation: reveal2 .6s ease-out 1.95s forwards; }
  .stat:nth-child(3) { animation: reveal2 .6s ease-out 2.2s forwards; }
  .stat:nth-child(4) { animation: reveal2 .6s ease-out 2.45s forwards; }
  .stat-val { font-family:'Orbitron',sans-serif; font-weight:900; font-size:40px; white-space:nowrap; }
  .stat-lbl { font-family:'Share Tech Mono',monospace; font-size:16px; letter-spacing:3px; color:#f000ff; text-shadow:0 0 8px rgba(240,0,255,.5); margin-top:8px; }
  .val-record { color:#e6eaff; }
  .val-pct { color:#00f0ff; text-shadow:0 0 14px rgba(0,240,255,.6); }
  .val-units { color:#00da88; text-shadow:0 0 14px rgba(0,218,136,.6); }
  .val-tag { color:#ffcc00; text-shadow:0 0 14px rgba(255,204,0,.6); font-size:38px; }
  .footer {
    position:absolute; bottom:74px; left:0; right:0; text-align:center;
    font-family:'Orbitron',sans-serif; font-size:29px; letter-spacing:3px; color:#f000ff;
    opacity:0; animation: reveal .7s ease-out 3.0s forwards;
  }
  @keyframes reveal { to { opacity:1; } }
  @keyframes reveal2 { to { opacity:1; transform:translateY(0); } }
  @keyframes pop { to { opacity:1; transform:scale(1); } }
  @keyframes growLine { to { transform:scaleX(1); } }
</style>
</head>
<body>
  <canvas id="bgCanvas" width="1080" height="1350" style="position:absolute;top:0;left:0;z-index:-1"></canvas>
  <script>
    // Exact same background algorithm as _cfBg() in docs/app.html (the
    // real card generator) — pixel-matched to StandardLogo.png. Drawing
    // it with canvas instead of approximating with CSS gradients avoids
    // any anti-aliasing/rendering differences between the two.
    (function(){
      var cv=document.getElementById('bgCanvas');
      var ctx=cv.getContext('2d');
      var W=1080,H=1350,cx=W/2,cy=H/2;
      ctx.fillStyle='#222233';ctx.fillRect(0,0,W,H);
      var DS=Math.max(8,Math.round(W/64));
      ctx.save();
      ctx.strokeStyle='rgba(78,166,176,.5)';ctx.lineWidth=1;
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,H);ctx.lineTo(i+H,0);ctx.stroke();}
      ctx.restore();
      var vg=ctx.createRadialGradient(cx,cy,W*.30,cx,cy,W*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.22)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    })();
  </script>
  <div class="stage">
    <div class="tag" id="tag">WEEKLY RECAP</div>
    <div class="logo">CLAIRVOYANCE</div>
    <div class="range" id="range">JULY 12 – 18, 2026</div>
    <div class="divider"></div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-val val-record" id="v-record">—</div><div class="stat-lbl">RECORD</div></div>
      <div class="stat"><div class="stat-val val-pct" id="v-pct">—</div><div class="stat-lbl">WIN %</div></div>
      <div class="stat"><div class="stat-val val-units" id="v-units">—</div><div class="stat-lbl">UNITS</div></div>
      <div class="stat"><div class="stat-val val-tag" id="v-extra">7 DAYS</div><div class="stat-lbl" id="v-extra-lbl">TRACKED</div></div>
    </div>
    <div class="footer">clairvoyanceengine.info &nbsp;·&nbsp; X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine</div>
  </div>
</body>
</html>
