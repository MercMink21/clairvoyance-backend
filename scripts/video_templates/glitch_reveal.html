<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  .stage {
    width:1080px; height:1350px; position:relative;
    background:transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .logo-wrap { position:relative; width:900px; height:100px; }
  .logo, .logo-r, .logo-c {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:88px; letter-spacing:8px;
    position:absolute; top:0; left:50%; transform:translateX(-50%); white-space:nowrap;
  }
  .logo { color:#f000ff; text-shadow:0 0 20px #f000ff,0 0 50px rgba(240,0,255,.7); opacity:0; animation: settle .01s linear 1.5s forwards; }
  .logo-r { color:#ff2090; opacity:.8; animation: glitchR 1.2s steps(2) forwards, hide .01s linear 1.5s forwards; }
  .logo-c { color:#00f0ff; opacity:.8; animation: glitchC 1.2s steps(2) forwards, hide .01s linear 1.5s forwards; }
  .sub {
    font-family:'Orbitron',sans-serif; font-weight:700; font-size:24px; letter-spacing:5px;
    color:#00f0ff; text-shadow:0 0 12px #00f0ff; margin-top:14px; opacity:0;
    animation: reveal .01s linear 2.4s forwards;
  }
  .headline {
    font-family:'Share Tech Mono',monospace; font-size:27px; letter-spacing:2px;
    color:#f000ff; text-shadow:0 0 10px rgba(240,0,255,.55);
    margin-top:50px; opacity:0; animation: reveal .01s linear 2.2s forwards;
  }
  .headline::before { content:'> '; color:#00da88; }
  .headline-date {
    font-family:'Share Tech Mono',monospace; font-size:17px; letter-spacing:3px;
    color:#00f0ff; text-shadow:0 0 8px rgba(0,240,255,.5);
    text-align:center; margin-top:10px; opacity:0;
    animation: reveal .01s linear 2.4s forwards;
  }
  .stats { display:flex; gap:36px; margin-top:56px; }
  .stat { text-align:center; }
  .stat-val {
    font-family:'Orbitron',sans-serif; font-weight:900; font-size:50px; white-space:nowrap;
    opacity:0; display:inline-block;
  }
  .stat-lbl {
    font-family:'Share Tech Mono',monospace; font-size:18px; letter-spacing:3px; color:#f000ff;
    text-shadow:0 0 8px rgba(240,0,255,.5); margin-top:8px; opacity:0;
  }
  /* Each stat glitches in on its own beat, then holds crisp and still —
     no duplicate DOM layers (like the logo's r/c split) needed; a hue-
     rotate + jitter keyframe on the element itself reads as the same
     glitch language at a fraction of the markup. */
  .stat:nth-child(1) .stat-val, .stat:nth-child(1) .stat-lbl { animation: statGlitch .4s steps(4) 2.6s forwards, statIn .01s linear 2.6s forwards; }
  .stat:nth-child(2) .stat-val, .stat:nth-child(2) .stat-lbl { animation: statGlitch .4s steps(4) 3.1s forwards, statIn .01s linear 3.1s forwards; }
  .stat:nth-child(3) .stat-val, .stat:nth-child(3) .stat-lbl { animation: statGlitch .4s steps(4) 3.6s forwards, statIn .01s linear 3.6s forwards; }
  .stat:nth-child(4) .stat-val, .stat:nth-child(4) .stat-lbl { animation: statGlitch .4s steps(4) 4.1s forwards, statIn .01s linear 4.1s forwards; }
  .val-record { color:#e6eaff; }
  .val-pct { color:#00f0ff; text-shadow:0 0 14px rgba(0,240,255,.6); }
  .val-units { color:#00da88; text-shadow:0 0 14px rgba(0,218,136,.6); }
  .val-locked { color:#ffcc00; text-shadow:0 0 14px rgba(255,204,0,.6); }
  .footer {
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    font-family:'Share Tech Mono',monospace; font-size:30px; color:#f000ff; text-shadow:0 0 10px rgba(240,0,255,.6);
    opacity:0; animation: reveal .01s linear 5.0s forwards;
  }
  @keyframes glitchR { 0%{transform:translate(calc(-50% - 6px),-4px)} 25%{transform:translate(calc(-50% + 5px),3px)} 50%{transform:translate(calc(-50% - 3px),-2px)} 75%{transform:translate(calc(-50% + 6px),4px)} 100%{transform:translate(calc(-50% - 6px),-4px)} }
  @keyframes glitchC { 0%{transform:translate(calc(-50% + 6px),3px)} 25%{transform:translate(calc(-50% - 5px),-4px)} 50%{transform:translate(calc(-50% + 3px),2px)} 75%{transform:translate(calc(-50% - 6px),-3px)} 100%{transform:translate(calc(-50% + 6px),3px)} }
  @keyframes hide { to { opacity:0; } }
  @keyframes settle { to { opacity:1; } }
  @keyframes reveal { to { opacity:1; } }
  @keyframes statIn { to { opacity:1; } }
  @keyframes statGlitch {
    0%   { filter:hue-rotate(0deg) saturate(1); transform:translate(0,0); }
    20%  { filter:hue-rotate(110deg) saturate(4) brightness(1.3); transform:translate(4px,-3px); }
    40%  { filter:hue-rotate(-110deg) saturate(4) brightness(1.3); transform:translate(-4px,3px); }
    60%  { filter:hue-rotate(70deg) saturate(3); transform:translate(3px,2px); }
    80%  { filter:hue-rotate(-70deg) saturate(3); transform:translate(-3px,-2px); }
    100% { filter:hue-rotate(0deg) saturate(1); transform:translate(0,0); }
  }
</style>
</head>
<body>
  <canvas id="bgCanvas" width="1080" height="1350" style="position:absolute;top:0;left:0;z-index:-1"></canvas>
  <script>
    // Exact same background algorithm as _cfBg() in docs/app.html (the
    // real card generator) — pixel-matched to StandardLogo.png. Drawing
    // it with canvas instead of approximating with CSS gradients avoids
    // any anti-aliasing/rendering differences between the two.
    (function(){
      var cv=document.getElementById('bgCanvas');
      var ctx=cv.getContext('2d');
      var W=1080,H=1350,cx=W/2,cy=H/2;
      ctx.fillStyle='#222233';ctx.fillRect(0,0,W,H);
      var DS=Math.max(8,Math.round(W/64));
      ctx.save();
      ctx.strokeStyle='rgba(78,166,176,.5)';ctx.lineWidth=1;
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+H,H);ctx.stroke();}
      for(var i=-H;i<=W+H;i+=DS){ctx.beginPath();ctx.moveTo(i,H);ctx.lineTo(i+H,0);ctx.stroke();}
      ctx.restore();
      var vg=ctx.createRadialGradient(cx,cy,W*.30,cx,cy,W*.72);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.22)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    })();
  </script>
  <div class="stage">
    <div class="logo-wrap">
      <div class="logo-r">CLAIRVOYANCE</div>
      <div class="logo-c">CLAIRVOYANCE</div>
      <div class="logo">CLAIRVOYANCE</div>
    </div>
    <div class="sub">ADVANCED SPORTS INTELLIGENCE ENGINE</div>
    <div class="headline" id="headline">YESTERDAY'S PERFORMANCE</div>
    <div class="headline-date" id="headline-date"></div>
    <div class="stats">
      <div class="stat"><div class="stat-val val-record" id="v-record">—</div><div class="stat-lbl">RECORD</div></div>
      <div class="stat"><div class="stat-val val-pct" id="v-pct">—</div><div class="stat-lbl">WIN %</div></div>
      <div class="stat"><div class="stat-val val-units" id="v-units">—</div><div class="stat-lbl">UNITS</div></div>
      <div class="stat"><div class="stat-val val-locked" id="v-locked">—</div><div class="stat-lbl">BETS LOCKED</div></div>
    </div>
    <div class="footer">clairvoyanceengine.info &nbsp;·&nbsp; X @clairvoyanceeng &nbsp;·&nbsp; IG @clairvoyanceengine</div>
  </div>
</body>
</html>
